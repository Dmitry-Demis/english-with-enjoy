        let activeAudio = null;
        let activeBtnId = null;
        let activeOriginalHTML = '';

        window.speakText = function(text, accent, btnId, event) {
            if (event) event.stopPropagation();

            // Если кликнули на уже играющую аудиозапись - останавливаем её
            if (activeAudio && activeBtnId === btnId) {
                activeAudio.pause();
                resetActiveButton();
                return;
            }

            // Сбрасываем предыдущую играющую кнопку
            if (activeBtnId) {
                resetActiveButton();
            }

            const btn = document.getElementById(btnId);
            if (!btn) return;

            // Запоминаем исходный вид кнопки
            activeBtnId = btnId;
            activeOriginalHTML = btn.innerHTML;

            // Отображаем анимацию загрузки/мышления
            btn.innerHTML = `
                <svg class="animate-spin h-3 w-3 text-current" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Ждем...</span>
            `;

            // Подготавливаем очищенный текст для озвучки
            const cleanText = encodeURIComponent(text.replace(/<[^>]*>/g, ''));
            const langCode = (accent === 'AmE') ? 'en-US' : 'en-GB';
            
            // Используем профессиональный и стабильный API Google Translate TTS
            const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${langCode}&client=tw-ob&q=${cleanText}`;

            if (activeAudio) {
                activeAudio.pause();
            }

            activeAudio = new Audio(ttsUrl);

            activeAudio.onplay = () => {
                // Анимация активного говорения (пульсирующий маркер)
                btn.innerHTML = `
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-current opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-current"></span>
                    </span>
                    <span class="font-extrabold uppercase tracking-wider text-[9px]">Голос</span>
                `;
            };

            activeAudio.onended = () => {
                resetActiveButton();
            };

            activeAudio.onerror = () => {
                // FALLBACK: если облачный API не отвечает, плавно переключаемся на внутренний SpeechSynthesis браузера
                console.warn("Облачный API заблокирован или недоступен. Запуск локального синтезатора.");
                btn.innerHTML = `<span>Синтез...</span>`;
                
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 0.85;
                    utterance.lang = langCode;

                    utterance.onend = () => {
                        resetActiveButton();
                    };
                    utterance.onerror = () => {
                        resetActiveButton();
                    };

                    window.speechSynthesis.speak(utterance);
                } else {
                    resetActiveButton();
                }
            };

            // Запускаем воспроизведение
            activeAudio.play().catch(() => {
                // В случае автоблокировки политикой браузера сразу переходим на запасной сценарий
                if (activeAudio) activeAudio.onerror();
            });
        };

        function resetActiveButton() {
            if (activeBtnId) {
                const btn = document.getElementById(activeBtnId);
                if (btn) {
                    btn.innerHTML = activeOriginalHTML;
                }
            }
            activeAudio = null;
            activeBtnId = null;
            activeOriginalHTML = '';
        }

                                        <path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/>
                                    </g>

                                    title="Американское произношение (AmE)">

                                        <rect width="74" height="39" rx="1"/>
                                    </clipPath>
                                    <g clip-path="url(#us-clip)">

                                        <circle cx="5" cy="4" r="1" fill="#fff"/>
                                        <circle cx="15" cy="4" r="1" fill="#fff"/>

                                        <circle cx="20" cy="8" r="1" fill="#fff"/>
                                        <circle cx="5" cy="12" r="1" fill="#fff"/>
                                        <circle cx="15" cy="12" r="1" fill="#fff"/>
                                        <circle cx="25" cy="12" r="1" fill="#fff"/>
                                        <circle cx="10" cy="16" r="1" fill="#fff"/>
                                        <circle cx="20" cy="16" r="1" fill="#fff"/>
                                    </g>
                                </svg>
                                <span>AmE</span>
                            </button>
                        </div>
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between space-y-4">
                        <div class="space-y-1">
                            <div>
                                <span class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-bold tracking-widest bg-lab-orangeLight text-lab-orange uppercase">${cardData.prn}</span>
                            </div>
                            <h4 class="text-base md:text-lg font-bold text-slate-800 leading-snug pt-1">${cardData.eng}</h4>
                            <p class="text-sm text-gray-500 mt-1">${cardData.rus}</p>
                        </div>
                    </div>
                `;
                examplesContainer.appendChild(card);
            });

            // 3. Обновить подсказку внизу
            document.getElementById('info-callout-text').innerHTML = data.info;
        }

        // Переключение табов
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = "tab-btn flex-1 py-3 px-4 rounded-xl text-sm font-bold text-gray-500 hover:text-slate-800 transition-all duration-300 flex items-center justify-center gap-2";
            });

            const activeBtn = document.getElementById(`btn-${tabId}`);
            if (activeBtn) {
                activeBtn.className = `tab-btn flex-1 py-3 px-4 rounded-xl text-sm font-bold transition-all duration-300 flex items-center justify-center gap-2 ${
                    tabId === 'affirmative' ? 'bg-lab-orange text-white shadow-sm shadow-lab-orange/10' :
                    tabId === 'negative' ? 'bg-red-500 text-white shadow-sm shadow-red-500/10' :
                    tabId === 'question' ? 'bg-blue-600 text-white shadow-sm shadow-blue-600/10' :
                    'bg-purple-600 text-white shadow-sm shadow-purple-600/10'
                }`;
            }

            renderTab(tabId);
        };

        // Запуск первой вкладки по умолчанию
        window.addEventListener('DOMContentLoaded', () => {
            renderTab('affirmative');
        });
